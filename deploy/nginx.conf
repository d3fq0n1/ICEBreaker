# ICEBreaker — nginx site config
# Place in /etc/nginx/sites-available/icebreaker
# ln -s /etc/nginx/sites-available/icebreaker /etc/nginx/sites-enabled/
#
# Also add to /etc/nginx/nginx.conf inside the http {} block:
#   include /etc/nginx/conf.d/icebreaker-ratelimit.conf;

# ---- Rate limit zones (add to http{} block in nginx.conf, or conf.d/) -----
# limit_req_zone $binary_remote_addr zone=icebreaker_post:10m rate=2r/m;
# limit_req_zone $binary_remote_addr zone=icebreaker_get:10m  rate=30r/m;
# ---------------------------------------------------------------------------

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Redirect all HTTP → HTTPS once cert is in place
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN_OR_IP;

    # --- TLS (fill in after: certbot --nginx -d YOUR_DOMAIN) ---
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Hardening ---
    server_tokens off;                        # hide nginx version
    client_max_body_size 4k;                  # sightings are tiny; reject large bodies
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 30s;

    # --- Security headers (belt-and-suspenders with app-level headers) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # --- Block non-essential methods ---
    if ($request_method !~ ^(GET|POST|HEAD|OPTIONS)$) {
        return 405;
    }

    # --- POST rate limit: 2 reports/minute per IP ---
    location = /api/sightings {
        limit_req zone=icebreaker_post burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # --- GET + everything else ---
    location / {
        limit_req zone=icebreaker_get burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }
}
